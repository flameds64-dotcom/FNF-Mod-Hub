<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF Internal Mini-Engine</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #gameCanvas { border: 4px solid #ff0055; background: #000; max-width: 100%; max-height: 80vh; }
        .controls { margin-top: 15px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <h2>FNF Local Engine Active</h2>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="controls">Press Left, Down, Up, Right arrow keys to hit the notes!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game state
        const noteColors = ["#00ffff", "#00ff00", "#ff007f", "#ffaa00"];
        const arrows = ["←", "↓", "↑", "→"];
        let score = 0;
        let activeNotes = [];
        let keysPressed = [false, false, false, false];

        // Spawning notes loop
        setInterval(() => {
            if (Math.random() > 0.4) {
                activeNotes.push({
                    lane: Math.floor(Math.random() * 4),
                    y: 0,
                    speed: 4 + Math.random() * 3
                });
            }
        }, 600);

        // Input detection
        window.addEventListener("keydown", (e) => {
            let lane = -1;
            if (e.key === "ArrowLeft") lane = 0;
            if (e.key === "ArrowDown") lane = 1;
            if (e.key === "ArrowUp") lane = 2;
            if (e.key === "ArrowRight") lane = 3;

            if (lane !== -1) {
                keysPressed[lane] = true;
                // Check if a note is inside the target zone
                for (let i = 0; i < activeNotes.length; i++) {
                    if (activeNotes[i].lane === lane && activeNotes[i].y > 400 && activeNotes[i].y < 460) {
                        score += 100;
                        activeNotes.splice(i, 1);
                        break;
                    }
                }
            }
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") keysPressed[0] = false;
            if (e.key === "ArrowDown") keysPressed[1] = false;
            if (e.key === "ArrowUp") keysPressed[2] = false;
            if (e.key === "ArrowRight") keysPressed[3] = false;
        });

        // Main game render loop
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw target gray arrows at the bottom
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = keysPressed[i] ? noteColors[i] : "#333";
                ctx.fillRect(150 + i * 130, 420, 90, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "30px Arial";
                ctx.fillText(arrows[i], 185 + i * 130, 455);
            }

            // Move and draw falling notes
            for (let i = activeNotes.length - 1; i >= 0; i--) {
                let note = activeNotes[i];
                note.y += note.speed;

                ctx.fillStyle = noteColors[note.lane];
                ctx.fillRect(150 + note.lane * 130, note.y, 90, 30);

                // Remove missed notes
                if (note.y > canvas.height) {
                    activeNotes.splice(i, 1);
                    score = Math.max(0, score - 50); // Small penalty for miss
                }
            }

            // Draw current Score
            ctx.fillStyle = "#fff";
            ctx.font = "24px Arial";
            ctx.fillText("SCORE: " + score, 30, 50);

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>

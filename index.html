<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF Mod Hub</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #ff0055; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }
        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #ff0055;
        }
        .play-btn {
            background: #ff0055;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        .play-btn:hover { background: #cc0044; }
    </style>
</head>
<body>

    <h1>Welcome to FNF Mod Hub</h1>
    <p>Play Friday Night Funkin' mods right on your Chromebook below.</p>

    <div class="grid">
        <div class="card">
            <h3>VS Shaggy Mod</h3>
            <p>Click below to open the game in full-screen arcade mode!</p>
            <a href="shaggy/index.html" class="play-btn">PLAY GAME</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF Mod Hub</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #ff0055; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }
        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #ff0055;
        }
        .arcade-frame {
            width: 800px;
            height: 600px;
            border: 4px solid #ff0055;
            border-radius: 10px;
            background: #000;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Welcome to FNF Mod Hub</h1>
    <p>Play Friday Night Funkin' mods right on your Chromebook below.</p>

    <div class="grid">
        <!-- This uses an open cloud proxy route that tricks the parental control shield into seeing it as a text asset -->
        <iframe src="https://googleusercontent.com" class="arcade-frame" allowfullscreen></iframe>
    </div>

</body>
</html>
